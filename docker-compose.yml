services:
  db:
    image: postgres:17
    container_name: informya_db
    restart: always
    environment:
      POSTGRES_USER: informya
      POSTGRES_PASSWORD: password
      POSTGRES_DB: informya
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: informya_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: