services:
  db:
    image: postgres:17
    container_name: informya_db
    restart: always
    environment:
      POSTGRES_USER: informya
      POSTGRES_PASSWORD: password
      POSTGRES_DB: informya
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Vérifie que PostgreSQL est vraiment prêt à accepter des connexions
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U informya -d informya"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8
    container_name: informya_redis
    restart: always
    ports:
      - "6379:6379"
    # Vérifie que Redis répond bien
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: informya_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    # Attend que db ET redis soient healthy avant de démarrer
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  postgres_data: